  C: X Minecraft Launcher
Summary:
  C: A modern Minecraft Launcher
Description:
  C: >-
    <p> 
      X Minecraft Launcher (XMCL) is a feature-rich Minecraft launcher that lets you manage
      resources like modpacks, resource packs, mods, and shader packs. It integrates with Minecraft
      Forge, Fabric, Quilt, CurseForge, and Modrinth.
    </p>
    <p>Key features:</p>
    <ul>
      <li>⚡️  Blazing-Fast Downloads: Concurrent multi-part downloads with HTTP/HTTPS socket reuse for maximum speed</li>
      <li>📚 Isolated Multi-Instancing: Create conflict-free environments for mods, versions, and custom configurations</li>
      <li>🗂l Smart Resource Management: Zero-duplication storage using hard/symbolic links to optimize disk space</li>
      <li>📦 One-Click Modpacks: Fully compliant import/export for CurseForge &amp; Modrinth collections</li>
      <li>🔧 Direct Mod Integration: Browse and install individual mods from CurseForge &amp; Modrinth</li>
      <li>⚙️  All Major Mod Loaders: Native support for Forge, Fabric, and Quilt frameworks</li>
      <li>🎨 Visual Enhancement Hub: Unified management for resource packs, shader packs, and texture packs</li>
      <li>👥 Multi-Account Hub: Seamless switching between Microsoft, Mojang, and third-party accounts</li>
      <li>🌐 Serverless Multiplayer: Built-in peer-to-peer hosting for instant game sharing</li>
    </ul>
