  C: A modern Minecraft Launcher
Description:
  C: "<p>\n      X Minecraft Launcher (XMCL) is a feature-rich Minecraft launcher that lets you manage\n      resources like
    modpacks, resource packs, mods, and shader packs. It integrates with Minecraft\n      Forge, Fabric, Quilt, CurseForge,
    and Modrinth.\n    </p>\n<p>Key features:</p>\n<ul>\n  <li>⚡️  Blazing-Fast Downloads: Concurrent multi-part downloads
    with HTTP/HTTPS socket reuse for maximum speed</li>\n  <li>\U0001F4DA Isolated Multi-Instancing: Create conflict-free
    environments for mods, versions, and custom configurations</li>\n  <li>\U0001F5C2 Smart Resource Management: Zero-duplication
    storage using hard/symbolic links to optimize disk space</li>\n  <li>\U0001F4E6 One-Click Modpacks: Fully compliant import/export
    for CurseForge &amp; Modrinth collections</li>\n  <li>\U0001F527 Direct Mod Integration: Browse and install individual
    mods from CurseForge &amp; Modrinth</li>\n  <li>⚙️  All Major Mod Loaders: Native support for Forge, Fabric, and Quilt
    frameworks</li>\n  <li>\U0001F3A8 Visual Enhancement Hub: Unified management for resource packs, shader packs, and texture
    packs</li>\n  <li>\U0001F465 Multi-Account Hub: Seamless switching between Microsoft, Mojang, and third-party accounts</li>\n
    \ <li>\U0001F310 Serverless Multiplayer: Built-in peer-to-peer hosting for instant game sharing</li>\n</ul>"
