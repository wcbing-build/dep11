Name:
  C: Muse Sounds Manager
Summary:
  C: Manage and install Muse Sounds for MuseScore Studio
Description:
  C: >-
    <p>Muse Sounds Manager is the dedicated sound library manager for MuseScore Studio on Linux.</p>

    <p>It allows you to download, install, and update high-quality playback sound libraries (Muse Sounds) produced by professional
    sound engineers. These libraries provide realistic instrument playback, dramatically improving the audio fidelity of your
    scores compared to standard MIDI or basic SoundFonts.</p>

    <p>Features include:</p>

    <ul><li>One-click installation of individual instrument sections (Strings, Brass, Woodwinds, Percussion, etc.)</li><li>Automatic
    integration with MuseScore Studio (appears in the Mixer upon next launch)</li><li>Management of installed sound libraries</li><li>Support
    for DEB and RPM based Linux distributions</li></ul>

    <p>Note: This application is specifically designed for Linux systems. Windows and macOS users utilize Muse Hub for similar
    functionality.</p>
